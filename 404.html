<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — Nolan Arc</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><ellipse cx='52' cy='52' rx='38' ry='26' fill='none' stroke='%23cc460c' stroke-width='3' transform='rotate(-20 52 52)'/></svg>">
<meta name="theme-color" content="#080706">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yrsa:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Syne:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#080706;--off:#0f0d0b;--faint:#1e1c18;--muted:#6a6560;--light:#d8d4cc;--white:#f0ebe2;--orange:#cc460c;--odim:#7a2a06;--title:'Yrsa',Georgia,serif;--head:'Syne',sans-serif;--body:'DM Sans',sans-serif;}
html,body{height:100%;}
body{background:var(--bg);color:var(--white);font-family:var(--body);font-weight:300;overflow:hidden;cursor:none;display:flex;flex-direction:column;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='.038'/%3E%3C/svg%3E");pointer-events:none;z-index:500;}
@media(hover:hover){#cur{position:fixed;width:7px;height:7px;background:var(--orange);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}#cur-ring{position:fixed;width:34px;height:34px;border:1px solid rgba(204,70,12,.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .1s,top .1s;}}
nav{padding:1.8rem 6vw;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:10;}
.nav-logo{font-family:var(--title);font-size:1.05rem;color:var(--white);text-decoration:none;}
.nav-logo em{font-style:italic;color:var(--orange);}
.arc{position:absolute;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}
.arc:nth-child(1){width:140vw;height:140vw;border:1px solid rgba(204,70,12,.02);animation:spin 80s linear infinite;}
.arc:nth-child(2){width:100vw;height:100vw;border:1px solid rgba(204,70,12,.04);animation:spin 60s linear infinite reverse;}
.arc:nth-child(3){width:65vw;height:65vw;border:1px solid rgba(204,70,12,.07);animation:spin 45s linear infinite;}
.arc:nth-child(4){width:35vw;height:35vw;border:1px solid rgba(204,70,12,.12);animation:spin 30s linear infinite reverse;}
.glow{position:absolute;top:50%;left:50%;width:60vw;height:60vw;background:radial-gradient(ellipse,rgba(204,70,12,.08) 0%,transparent 60%);transform:translate(-50%,-50%);pointer-events:none;}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem 6vw;position:relative;z-index:2;}
.e404-num{font-family:var(--title);font-size:clamp(8rem,25vw,22rem);font-weight:400;font-style:italic;color:rgba(204,70,12,.1);line-height:1;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;user-select:none;white-space:nowrap;}
.e404-content{position:relative;z-index:1;}
.e404-kicker{font-family:var(--head);font-size:.5rem;letter-spacing:.24em;text-transform:uppercase;color:var(--orange);margin-bottom:2rem;display:flex;align-items:center;justify-content:center;gap:1rem;opacity:0;animation:up .8s .2s both;}
.e404-kicker::before{content:'';width:22px;height:1px;background:var(--orange);}
.e404-title{font-family:var(--title);font-size:clamp(2rem,5vw,4rem);font-weight:400;font-style:italic;color:var(--white);line-height:1.1;margin-bottom:1.5rem;opacity:0;animation:up .9s .4s both;}
.e404-title em{color:var(--orange);}
.e404-text{font-family:var(--body);font-size:.9rem;color:var(--muted);line-height:1.9;max-width:420px;margin:0 auto 3rem;opacity:0;animation:up .9s .6s both;}
.e404-links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;opacity:0;animation:up .9s .8s both;}
.e404-link-primary{display:inline-flex;align-items:center;gap:1rem;padding:1rem 2.2rem;border:1px solid var(--orange);font-family:var(--head);font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);text-decoration:none;position:relative;overflow:hidden;transition:color .4s;}
.e404-link-primary::before{content:'';position:absolute;inset:0;background:var(--orange);transform:translateX(-100%);transition:transform .45s cubic-bezier(.16,1,.3,1);}
.e404-link-primary:hover{color:var(--bg);}
.e404-link-primary:hover::before{transform:translateX(0);}
.e404-link-primary span{position:relative;z-index:1;}
.e404-link-sec{display:inline-flex;align-items:center;gap:.8rem;padding:1rem 2rem;border:1px solid var(--faint);font-family:var(--head);font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:all .3s;}
.e404-link-sec:hover{border-color:var(--muted);color:var(--light);}
footer{padding:1.5rem 6vw;border-top:1px solid var(--faint);display:flex;justify-content:space-between;align-items:center;position:relative;z-index:10;}
.foot-copy{font-family:var(--head);font-size:.42rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
@keyframes up{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
@media(max-width:768px){body{cursor:auto;}#cur,#cur-ring{display:none;}.e404-links{flex-direction:column;align-items:center;}}
</style>
</head>
<body>
<div id="cur"></div><div id="cur-ring"></div>
<div class="arc"></div><div class="arc"></div><div class="arc"></div><div class="arc"></div>
<div class="glow"></div>
<nav><a href="index.html" class="nav-logo">Nolan<em>.Arc</em></a></nav>
<main>
  <div class="e404-num" aria-hidden="true">404</div>
  <div class="e404-content">
    <div class="e404-kicker">Page introuvable</div>
    <h1 class="e404-title">Ce plan n'existe <em>pas.</em></h1>
    <p class="e404-text">La page que tu cherches a été déplacée, renommée ou n'a jamais existé. Mais le reste du site, lui, est bien là.</p>
    <div class="e404-links">
      <a href="index.html" class="e404-link-primary"><span>← Retour à l'accueil</span></a>
      <a href="index.html#work" class="e404-link-sec">Voir le portfolio</a>
      <a href="index.html#contact" class="e404-link-sec">Me contacter</a>
    </div>
  </div>
</main>
<footer><div class="foot-copy">© 2026 · Nolan Arc</div><div class="foot-copy">Erreur 404</div></footer>
<script>
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
if(cur){let mx=0,my=0,rx=0,ry=0;document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});(function loop(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop);})();}
</script>
</body>
</html>
